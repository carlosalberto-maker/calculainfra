<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reporte EDS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f6f9;
    color: #1a1a2e;
  }
  .toolbar {
    background: linear-gradient(135deg, #1a237e, #283593);
    color: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.15);
  }
  .toolbar h2 {
    font-size: 16px;
    font-weight: 600;
  }
  .toolbar-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,.15);
    color: white;
    border: 1px solid rgba(255,255,255,.3);
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: background .2s;
  }
  .btn:hover {
    background: rgba(255,255,255,.25);
  }
  .btn-primary {
    background: #43a047;
    border-color: #43a047;
  }
  .btn-primary:hover {
    background: #388e3c;
  }
  .iframe-wrap {
    width: 100%;
    height: calc(100vh - 64px);
  }
  .iframe-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .flash {
    background: #fff3e0;
    color: #e65100;
    padding: 12px 24px;
    font-size: 14px;
  }
  @media print {
    .toolbar { display: none; }
    .iframe-wrap { height: auto; }
    .iframe-wrap iframe { height: auto; }
  }
</style>
</head>
<body>
<div class="toolbar">
  <h2>📊 Reporte de Infraestructura EDS</h2>
  <div class="toolbar-actions">
    <a href="javascript:window.print()" class="btn">🖨️ Imprimir</a>
    {% if excel_filename %}
    <a href="{{ url_for('descargar', filename=excel_filename) }}" class="btn btn-primary">📥 Descargar Excel actualizado</a>
    {% endif %}
    <a href="{{ url_for('index') }}" class="btn">← Nuevo análisis</a>
  </div>
</div>
<div class="iframe-wrap">
  <iframe srcdoc="{{ html_content|replace('"', '&quot;')|safe }}"></iframe>
</div>
</body>
</html>
